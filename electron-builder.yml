appId: com.tab-badminton.app
productName: Tab Badminton
copyright: Copyright © 2025

directories:
  buildResources: build

extraResources:
  - from: src/main/db/migrations
    to: migrations
    filter:
      - '**/*.sql'
      - 'meta/**'

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,eslint.config.mjs}'
  - '!{.prettierignore,.prettierrc.yaml,dev-app-update.yml}'
  - '!{.editorconfig,*.md}'
  - '!{tsconfig.json,tsconfig.*}'
  - '!{vitest.config.*,vitest.setup.*}'

asarUnpack:
  - resources/**

win:
  executableName: tab-badminton
  target:
    - target: nsis
      arch:
        - x64

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always

mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
  target:
    - target: dmg
      arch:
        - arm64
        - x64

dmg:
  artifactName: ${name}-${version}.${ext}

linux:
  target:
    - AppImage
  maintainer: electronjs.org
  category: Utility

appImage:
  artifactName: ${name}-${version}.${ext}

npmRebuild: false
